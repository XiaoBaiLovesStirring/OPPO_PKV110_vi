name: Build PKV110 Exploit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api: [35, 37]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/android-ndk-cache/android-ndk-r29
          key: ndk-r29-v2-${{ runner.os }}

      - name: Download Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/android-ndk-cache
          cd ~/android-ndk-cache
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          unzip -q android-ndk-r29-linux.zip
          rm android-ndk-r29-linux.zip
          echo "NDK downloaded"

      - name: Verify NDK
        run: |
          ls ~/android-ndk-cache/android-ndk-r29/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android* | head -5
          echo "---"
          ~/android-ndk-cache/android-ndk-r29/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang --version 2>&1 || true

      - name: Setup NDK
        run: |
          NDK_BASE=$HOME/android-ndk-cache/android-ndk-r29
          echo "ANDROID_NDK_HOME=$NDK_BASE" >> $GITHUB_ENV
          echo "NDK_ROOT=$NDK_BASE" >> $GITHUB_ENV
          TOOLCHAIN=$NDK_BASE/toolchains/llvm/prebuilt/linux-x86_64
          echo "SYSROOT=$TOOLCHAIN/sysroot" >> $GITHUB_ENV
          echo "RESOURCE_DIR=$TOOLCHAIN/lib/clang/21" >> $GITHUB_ENV

      - name: Build (API=${{ matrix.api }})
        run: |
          cd exploit
          API=${{ matrix.api }}
          TOOLCHAIN=$HOME/android-ndk-cache/android-ndk-r29/toolchains/llvm/prebuilt/linux-x86_64
          SYSROOT=$TOOLCHAIN/sysroot
          RESDIR=$TOOLCHAIN/lib/clang/21
          LIBDIR=$SYSROOT/usr/lib/aarch64-linux-android
          make preload \
            CC="clang" \
            TARGET_FLAGS="--target=aarch64-linux-android$API --sysroot=$SYSROOT -resource-dir $RESDIR" \
            TARGET_COMMON_LDFLAGS="-fuse-ld=lld -Wl,-rpath-link,$LIBDIR/$API -L$LIBDIR/$API -L$LIBDIR -B$LIBDIR/$API" \
            TARGET_PIE_LDFLAGS="-fuse-ld=lld -Wl,-rpath-link,$LIBDIR/$API -L$LIBDIR/$API -L$LIBDIR -B$LIBDIR/$API -Wl,-dynamic-linker,/system/bin/linker64" \
            API=$API

      - name: Upload artifact (API=${{ matrix.api }})
        uses: actions/upload-artifact@v4
        with:
          name: PKV110-preload-API${{ matrix.api }}
          path: |
            exploit/build/PKV110-16.0.2.401/bin/preload.so
            exploit/build/embed/su_daemon_aarch64_pie
