name: Build PKV110 Exploit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api: [35, 37]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/android-ndk-cache/android-ndk-r29
          key: ndk-r29-v3-${{ runner.os }}

      - name: Download Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/android-ndk-cache
          cd ~/android-ndk-cache
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          unzip -q android-ndk-r29-linux.zip
          rm android-ndk-r29-linux.zip

      - name: Build (API=${{ matrix.api }})
        run: |
          cd exploit
          NDK=$HOME/android-ndk-cache/android-ndk-r29
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          SYSROOT=$TOOLCHAIN/sysroot
          RESDIR=$TOOLCHAIN/lib/clang/21
          API=${{ matrix.api }}
          make preload \
            CC="$TOOLCHAIN/bin/aarch64-linux-android21-clang" \
            TARGET_FLAGS="--target=aarch64-linux-android$API --sysroot=$SYSROOT -resource-dir=$RESDIR --rtlib=compiler-rt --unwindlib=none" \
            TARGET_COMMON_LDFLAGS="-fuse-ld=lld" \
            TARGET_PIE_LDFLAGS="-fuse-ld=lld -Wl,-dynamic-linker,/system/bin/linker64" \
            API=$API

      - name: Upload artifact (API=${{ matrix.api }})
        uses: actions/upload-artifact@v4
        with:
          name: PKV110-preload-API${{ matrix.api }}
          path: |
            exploit/build/PKV110-16.0.2.401/bin/preload.so
            exploit/build/embed/su_daemon_aarch64_pie
